<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HEXA — Groupe BCNC</title>
<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js" crossorigin="anonymous"></script>
</head>
<body>
<script>
// Si l'URL contient un hash MSAL (code, error, state), traiter le callback
// avant de rediriger — sinon le token est perdu
const hash = window.location.hash || '';
const search = window.location.search || '';
const hasMsalCallback = hash.includes('code=') || hash.includes('error=') || search.includes('code=') || search.includes('error=');

if (hasMsalCallback) {
  // Traiter le callback MSAL puis rediriger
  const msalConfig = {
    auth: {
      clientId: 'ce885b92-7692-4ca5-aae6-756a5e94a792',
      authority: 'https://login.microsoftonline.com/de95b546-4d79-47f1-aafe-8926ca63e424',
      redirectUri: 'https://bannequin.github.io/hexa/'
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  const msalInstance = new msal.PublicClientApplication(msalConfig);
  msalInstance.handleRedirectPromise()
    .then(() => { window.location.replace('hexa-accueil.html'); })
    .catch(() => { window.location.replace('hexa-accueil.html'); });
} else {
  // Pas de callback MSAL — redirection directe
  window.location.replace('hexa-accueil.html');
}
</script>
</body>
</html>
